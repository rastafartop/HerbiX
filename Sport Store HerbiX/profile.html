<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HerbiX — Профиль</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="stylesheet" href="./assets/css/profile.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.48.0/dist/umd/supabase.min.js"></script>
</head>
<body class="page-profile">

  <header class="header">
    <div class="container header-content">
      <a href="index.html" class="logo-link">
        <img src="./assets/logo.svg" alt="HerbiX" id="logo" />
      </a>
      <nav class="nav">
        <a href="catalog.html">Каталог</a>
        <a href="index.html#about">О нас</a>
        <a href="index.html#delivery">Доставка</a>
        <a href="index.html#contacts">Контакты</a>
      </nav>
      <a href="auth.html" class="auth-user">
        <span class="auth-user-icon">👤</span>
        <span class="auth-user-text">Войти</span>
      </a>
      <button id="cart-button" class="cart-button">
        🛒 Корзина (<span id="cart-count">0</span>)
      </button>
    </div>
  </header>

  <main class="profile-main container">

    <div class="profile-layout">

      <!-- Левая колонка — аватар и имя -->
      <aside class="profile-sidebar">
        <div class="profile-avatar-wrap">
          <div class="profile-avatar" id="profile-avatar">
            <span id="avatar-initials">?</span>
            <img id="avatar-img" src="" alt="" style="display:none;" />
          </div>
          <label class="avatar-upload-btn" for="avatar-input" title="Загрузить фото">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          </label>
          <input type="file" id="avatar-input" accept="image/*" style="display:none;" />
        </div>

        <div class="profile-sidebar-info">
          <p class="profile-sidebar-name" id="sidebar-name">Загрузка...</p>
          <p class="profile-sidebar-email" id="sidebar-email"></p>
        </div>

        <nav class="profile-nav">
          <button class="profile-nav-btn active" data-section="info" type="button">👤 Личные данные</button>
          <button class="profile-nav-btn" data-section="password" type="button">🔒 Пароль</button>
          <button class="profile-nav-btn logout" id="logout-btn" type="button">↩ Выйти</button>
        </nav>
      </aside>

      <!-- Правая колонка — секции -->
      <div class="profile-content">

        <!-- Личные данные -->
        <section class="profile-section active" id="section-info">
          <h2 class="profile-section-title">Личные данные</h2>

          <div class="profile-field">
            <label for="field-name">Имя</label>
            <input type="text" id="field-name" placeholder="Как к вам обращаться" />
          </div>

          <div class="profile-field">
            <label for="field-phone">Телефон</label>
            <input type="tel" id="field-phone" placeholder="+7 (___) ___-__-__" />
          </div>

          <div class="profile-field profile-field--readonly">
            <label>E-mail</label>
            <input type="email" id="field-email" disabled />
            <span class="field-hint">Email изменить нельзя</span>
          </div>

          <div class="profile-actions">
            <button class="btn-primary profile-save-btn" id="save-info-btn">Сохранить изменения</button>
            <span class="profile-save-status" id="save-info-status"></span>
          </div>
        </section>

        <!-- Пароль -->
        <section class="profile-section" id="section-password">
          <h2 class="profile-section-title">Смена пароля</h2>

          <div class="profile-field">
            <label for="field-new-password">Новый пароль</label>
            <div class="password-wrap">
              <input type="password" id="field-new-password" placeholder="Минимум 6 символов" />
              <button class="toggle-password" data-target="field-new-password" type="button">👁</button>
            </div>
          </div>

          <div class="profile-field">
            <label for="field-confirm-password">Повторите пароль</label>
            <div class="password-wrap">
              <input type="password" id="field-confirm-password" placeholder="Ещё раз пароль" />
              <button class="toggle-password" data-target="field-confirm-password" type="button">👁</button>
            </div>
          </div>

          <div class="profile-actions">
            <button class="btn-primary profile-save-btn" id="save-password-btn">Изменить пароль</button>
            <span class="profile-save-status" id="save-password-status"></span>
          </div>
        </section>

      </div>
    </div>
  </main>

  <div id="toast" class="toast"></div>
  <script src="./assets/js/app.js"></script>
  <script src="./assets/js/product.js"></script>
  <script src="assets/js/user-nav.js"></script>
  <script src="assets/js/image-cropper.js"></script>
  <script src="assets/js/profile.js"></script>
</body>
</html>
